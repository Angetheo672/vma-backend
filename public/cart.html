<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mon Panier | VMA Elite</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="app-shell">
    <header class="app-header">
        <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <i class="fa fa-chevron-left" onclick="history.back()" style="color: var(--vma-gold); font-size: 20px;"></i>
                <span style="font-weight: 700; color: #fff; letter-spacing: 1px;">MON PANIER</span>
            </div>
            <i class="fa-regular fa-trash-can" onclick="clearCart()" style="color: #444; font-size: 18px;"></i>
        </div>
    </header>

    <main class="scroll-container">
        <div id="cartItemsList" class="p-16">
            <!-- Items injected -->
        </div>

        <div id="emptyCart" style="text-align: center; margin-top: 100px; display: none;">
            <i class="fa fa-shopping-basket" style="font-size: 60px; color: #111; margin-bottom: 20px;"></i>
            <h3 style="color: #444;">Votre panier est vide</h3>
            <button onclick="location.href='index.html'" class="vma-btn-primary" style="margin-top: 20px; width: auto; padding: 10px 40px;">Boutique</button>
        </div>
    </main>

    <!-- CHECKOUT BAR (Integration Robuste dans le Shell) -->
    <div id="checkoutBar" style="background: #080808; padding: 15px 20px; border-top: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; z-index: 2100; flex-shrink: 0;">
        <div>
            <span style="font-size: 11px; color: var(--text-muted);">Total</span>
            <div id="cartTotal" style="font-size: 18px; font-weight: 800; color: var(--vma-gold);">0 F</div>
        </div>
        <button onclick="showPaymentModal()" class="vma-btn-primary" style="padding: 12px 35px; box-shadow: 0 5px 15px rgba(255,215,0,0.2);">
            PAYER
        </button>
    </div>

    <!-- PAYMENT MODAL -->
    <div id="paymentModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; align-items: center; justify-content: center; padding: 20px;">
        <div style="background: #111; width: 100%; max-width: 400px; border-radius: 25px; padding: 30px; border: 1px solid #222; animation: slideUp 0.3s ease-out;">
            <h2 style="font-size: 20px; margin-bottom: 5px; text-align: center; font-weight: 800;">PAIEMENT SÉCURISÉ</h2>
            <p style="text-align: center; font-size: 11px; color: var(--text-muted); margin-bottom: 25px;">Choisissez votre opérateur mobile</p>

            <div style="display: grid; gap: 12px;">
                <div class="pay-option" onclick="selectPay('om')">
                    <div style="width: 40px; height: 40px; background: #FF7900; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #fff;">OM</div>
                    <div style="flex: 1;">
                        <div style="font-weight: 600; font-size: 14px;">Orange Money</div>
                        <div style="font-size: 10px; color: var(--text-muted);">Compte: 659 337 034</div>
                    </div>
                    <i class="fa fa-chevron-right" style="font-size: 12px; color: #333;"></i>
                </div>

                <div class="pay-option" onclick="selectPay('momo')">
                    <div style="width: 40px; height: 40px; background: #FFCC00; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #000;">MTN</div>
                    <div style="flex: 1;">
                        <div style="font-weight: 600; font-size: 14px;">MTN Mobile Money</div>
                        <div style="font-size: 10px; color: var(--text-muted);">Compte: 672 359 133</div>
                    </div>
                    <i class="fa fa-chevron-right" style="font-size: 12px; color: #333;"></i>
                </div>
            </div>

            <div id="phoneInput" style="display: none; margin-top: 30px; animation: fadeIn 0.4s;">
                <div class="input-group" style="margin-bottom: 20px;">
                    <i class="fa fa-phone"></i>
                    <input type="tel" id="userPhone" placeholder="Votre numéro de paiement" style="padding-left: 50px;">
                </div>
                <button onclick="processVmaPayment()" class="vma-btn-primary" style="width: 100%; height: 55px;">VALIDER LE PAIEMENT</button>
            </div>

            <p onclick="document.getElementById('paymentModal').style.display='none'" style="text-align: center; color: #444; font-size: 12px; margin-top: 25px; text-decoration: underline;">Annuler la transaction</p>
        </div>
    </div>

    <style>
        .pay-option {
            background: #080808; padding: 18px; border-radius: 18px; display: flex; align-items: center; gap: 15px; border: 1px solid #1a1a1a; transition: all 0.3s;
        }
        .pay-option:active { border-color: var(--vma-gold); background: #111; }
        .input-group { position: relative; }
        .input-group i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--vma-gold); }
        input { width: 100%; padding: 15px; background: #080808; border: 1px solid #222; border-radius: 15px; color: #fff; outline: none; }
    </style>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        let selectedMethod = '';
        let targetAccount = '';

        document.addEventListener('DOMContentLoaded', () => { renderCart(); });

        function renderCart() {
            // Nettoyage de sécurité
            VMA_DATA.cart = VMA_DATA.cart.filter(item => item !== null);

            const list = document.getElementById('cartItemsList');
            const totalDisplay = document.getElementById('cartTotal');
            const emptyState = document.getElementById('emptyCart');
            const checkoutBar = document.getElementById('checkoutBar');

            if (VMA_DATA.cart.length === 0) {
                list.style.display = 'none';
                checkoutBar.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            let total = 0;
            list.innerHTML = VMA_DATA.cart.map((item, index) => {
                total += item.price;
                const img = item.image || (item.images && item.images[0]) || 'https://via.placeholder.com/100';
                return `
                    <div style="display: flex; gap: 15px; background: #080808; padding: 15px; border-radius: 20px; margin-bottom: 12px; border: 1px solid #1a1a1a;">
                        <img src="${img}" style="width: 70px; height: 70px; border-radius: 12px; object-fit: cover;">
                        <div style="flex: 1;">
                            <h4 style="font-size: 13px; font-weight: 600;">${item.name}</h4>
                            <div style="color: var(--vma-gold); font-weight: 800; font-size: 15px; margin: 4px 0;">${formatPrice(item.price)} F</div>
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span style="font-size: 10px; color: var(--vma-blue);">Livraison Chine-Afrique</span>
                                <i class="fa-regular fa-trash-can" onclick="removeItem(${index})" style="color: #333;"></i>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            totalDisplay.innerText = formatPrice(total) + " F";
        }

        function removeItem(index) {
            VMA_DATA.cart.splice(index, 1);
            localStorage.setItem('vma_cart', JSON.stringify(VMA_DATA.cart));
            renderCart();
            updateCartBadge();
        }

        function showPaymentModal() {
            if (!localStorage.getItem('vma_token')) {
                if(window.Android) Android.showToast("Veuillez vous connecter");
                location.href = 'auth.html';
                return;
            }
            document.getElementById('paymentModal').style.display = 'flex';
        }

        function selectPay(method) {
            selectedMethod = method;
            targetAccount = method === 'om' ? '659337034' : '672359133';
            document.getElementById('phoneInput').style.display = 'block';
        }

        async function processVmaPayment() {
            const userPhone = document.getElementById('userPhone').value;
            if(!userPhone) return alert("Entrez votre numéro");

            try {
                // Nettoyage final du panier
                VMA_DATA.cart = VMA_DATA.cart.filter(item => item !== null);
                if (VMA_DATA.cart.length === 0) throw new Error("Votre panier est vide");

                const total = VMA_DATA.cart.reduce((s, i) => s + (i.price || 0), 0);

                // 1. Create Order
                const order = await API.createOrder({
                    items: VMA_DATA.cart.map(i => ({ product: i._id, quantity: 1, price: i.price })),
                    totalAmount: total,
                    shippingAddress: { street: "Livraison VMA", city: "Douala", country: "CM" }
                });

                // 2. Official Payment Call
                const res = await API.initiatePayment({
                    orderId: order._id,
                    method: selectedMethod === 'om' ? 'orange_money' : 'mtn_momo',
                    country: 'CM',
                    phoneNumber: userPhone,
                    amount: total
                });

                if(window.Android) Android.showToast("Signal envoyé au " + targetAccount);

                // Final UX Success
                setTimeout(() => {
                    VMA_DATA.cart = [];
                    localStorage.setItem('vma_cart', JSON.stringify([]));
                    if(window.Android) Android.showToast("✅ Commande #"+order._id.slice(-5).toUpperCase()+" validée !");
                    location.href = 'index.html';
                }, 3000);

            } catch (e) { alert(e.message); }
        }
    </script>
</body>
</html>
