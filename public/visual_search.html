<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sourcing IA Visuel | VMA Emma Elite</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="app-shell" style="background: #000;">
    <header class="app-header" style="height: 65px;">
        <div style="display: flex; align-items: center; gap: 15px; width: 100%;">
            <i class="fa fa-chevron-left" onclick="history.back()" style="color: var(--vma-gold); font-size: 20px;"></i>
            <span style="font-size: 15px; font-weight: 800; color: #fff;">SCANNER ÉLITE VMA</span>
        </div>
    </header>

    <main class="scroll-container" style="padding-bottom: 50px;">
        <div class="visual-hero" style="text-align: center; padding: 40px 20px 20px;">
            <div id="ai-brain" style="width: 80px; height: 80px; background: rgba(255,215,0,0.1); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--vma-gold);">
                <i class="fa fa-brain" style="color: var(--vma-gold); font-size: 30px; animation: pulse 2s infinite;"></i>
            </div>
            <h2 style="font-size: 20px; font-weight: 800;">RECHERCHE VISUELLE AI</h2>
            <p style="font-size: 12px; color: #666; max-width: 280px; margin: 10px auto;">Emma analyse vos photos pour trouver les meilleures usines à Guangzhou, Yiwu et Istanbul.</p>
        </div>

        <div id="captureArea" style="margin: 0 20px; background: #0a0a0a; border: 2px dashed #222; border-radius: 25px; padding: 40px 20px; text-align: center; transition: 0.3s;" onclick="document.getElementById('imageInput').click()">
            <div id="placeholder">
                <i class="fa fa-camera" style="font-size: 40px; color: #222; margin-bottom: 15px;"></i>
                <p style="font-size: 13px; color: #444; font-weight: 600;">CLIQUEZ POUR SCANNER</p>
            </div>
            <img id="previewImg" style="display: none; width: 100%; border-radius: 20px; border: 1.5px solid var(--vma-gold);">
            <input type="file" id="imageInput" accept="image/*" capture="environment" style="display: none;">
        </div>

        <div id="actionArea" style="display: none; padding: 25px 20px;">
            <button class="vma-btn-primary" style="width: 100%; height: 55px; font-size: 14px;" onclick="startAISourcing()">
                <i class="fa fa-robot" style="margin-right: 10px;"></i> ANALYSER AVEC EMMA AI
            </button>
            <p onclick="location.reload()" style="text-align: center; color: #555; font-size: 12px; margin-top: 15px; text-decoration: underline;">Annuler</p>
        </div>

        <!-- RESULTS DYNAMIQUES -->
        <div id="resultsSection" style="display: none; padding: 0 20px;">
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
                <div style="height: 18px; width: 3px; background: var(--vma-gold);"></div>
                <h3 style="font-size: 14px; font-weight: 800;">RÉSULTATS DU SOURCING</h3>
            </div>
            <div class="main-grid" id="visualGrid"></div>
        </div>

        <!-- LOADER ELITE -->
        <div id="loaderArea" style="display: none; text-align: center; padding: 40px;">
            <div class="loader-circle" style="width: 40px; height: 40px; border: 3px solid #111; border-top-color: var(--vma-gold); border-radius: 50%; margin: 0 auto 15px; animation: spin 1s linear infinite;"></div>
            <p style="color: var(--vma-gold); font-size: 12px; font-weight: 700; letter-spacing: 1px;">ANALYSE PIXEL... 1688 / ALIBABA / AMAZON</p>
        </div>
    </main>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>

    <script src="js/api.js"></script>
    <script>
        const imageInput = document.getElementById('imageInput');
        const previewImg = document.getElementById('previewImg');
        const placeholder = document.getElementById('placeholder');
        const actionArea = document.getElementById('actionArea');

        imageInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (re) => {
                    previewImg.src = re.target.result;
                    previewImg.style.display = 'block';
                    placeholder.style.display = 'none';
                    actionArea.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        };

        async function startAISourcing() {
            const file = imageInput.files[0];
            const loader = document.getElementById('loaderArea');
            const results = document.getElementById('resultsSection');
            const grid = document.getElementById('visualGrid');

            actionArea.style.display = 'none';
            loader.style.display = 'block';

            const formData = new FormData();
            formData.append('image', file);

            try {
                const response = await fetch(`${API_BASE_URL}/tools/visual-search`, {
                    method: 'POST',
                    headers: { 'x-auth-token': localStorage.getItem('vma_token') },
                    body: formData
                });

                const data = await response.json();

                loader.style.display = 'none';
                results.style.display = 'block';

                grid.innerHTML = data.platforms.flatMap(p => p.results.map(item => `
                    <div class="modern-card" onclick="location.href='product.html?id=global&name=${encodeURIComponent(item.name)}&price=${item.price}&img=${encodeURIComponent(item.image)}&source=${item.source}'">
                        <div class="card-image-wrap">
                            <img src="${item.image}" alt="${item.name}">
                            <div class="source-tag" style="background: ${item.source === '1688' ? '#ff6600' : 'var(--vma-gold)'}">${item.source}</div>
                        </div>
                        <div class="card-body">
                            <h3 class="product-name">${item.name}</h3>
                            <div class="price-row">
                                <span class="current-price">${new Intl.NumberFormat('fr-FR').format(item.price)} F</span>
                            </div>
                        </div>
                    </div>
                `)).join('');

            } catch (err) {
                loader.style.display = 'none';
                actionArea.style.display = 'block';
                alert("Erreur d'analyse. Réessayez.");
            }
        }
    </script>
</body>
</html>
