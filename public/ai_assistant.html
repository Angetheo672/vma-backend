<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VMA Emma | Intelligence Sourcing</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #000;
            padding-bottom: 120px;
        }
        .msg-bot, .msg-user {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        .msg-bot {
            background: #111;
            color: #eee;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid #222;
        }
        .msg-user {
            background: var(--vma-gold);
            color: #000;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(255,215,0,0.2);
        }
        .input-area {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(8,8,8,0.95);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
            border-top: 1px solid #1a1a1a;
            display: flex;
            gap: 12px;
            align-items: center;
            z-index: 2000;
        }
        .chat-input {
            flex: 1;
            background: #111;
            border: 1px solid #333;
            border-radius: 25px;
            padding: 12px 20px;
            color: #fff;
            font-family: inherit;
            outline: none;
            font-size: 14px;
        }
        .chat-input:focus { border-color: var(--vma-gold); }
        .send-btn {
            width: 48px;
            height: 48px;
            background: var(--vma-gold);
            border: none;
            border-radius: 50%;
            color: #000;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .typing { font-style: italic; color: #555; font-size: 12px; margin-left: 5px; }
    </style>
</head>
<body class="app-shell">
    <header class="app-header" style="height: 65px;">
        <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <i class="fa fa-chevron-left" onclick="history.back()" style="color: var(--vma-gold); font-size: 20px;"></i>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div style="width: 38px; height: 38px; background: #ff4d94; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--vma-gold);">
                        <i class="fa fa-robot" style="color: #fff;"></i>
                    </div>
                    <div>
                        <div style="font-size: 15px; font-weight: 800; color: #fff;">EMMA IA ELITE</div>
                        <div style="font-size: 10px; color: var(--vma-green); font-weight: 700;">ACTIVE</div>
                    </div>
                </div>
            </div>
            <i class="fa-solid fa-broom" onclick="clearChat()" style="color: #444; font-size: 18px; padding: 10px;"></i>
        </div>
    </header>

    <main class="chat-body" id="chatContainer">
        <div class="msg-bot">Bonjour ! Je suis Emma. Comment puis-je vous aider dans votre business aujourd'hui ? Je peux analyser vos questions de sourcing, logistique ou stratégie globale.</div>
    </main>

    <div class="input-area">
        <input type="text" id="chatInput" class="chat-input" placeholder="Écrivez votre question ici..." autocomplete="off">
        <button id="sendBtn" class="send-btn">
            <i class="fa fa-paper-plane"></i>
        </button>
    </div>

    <script src="js/api.js"></script>
    <script>
        const chatContainer = document.getElementById('chatContainer');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');

        let chatHistory = JSON.parse(localStorage.getItem('vma_chat_history') || '[]');

        function loadHistory() {
            chatHistory.forEach(msg => {
                const div = document.createElement('div');
                div.className = msg.role === 'user' ? 'msg-user' : 'msg-bot';
                div.innerText = msg.content;
                chatContainer.appendChild(div);
            });
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function clearChat() {
            if(confirm("Effacer la conversation ?")) {
                chatHistory = [];
                localStorage.setItem('vma_chat_history', '[]');
                location.reload();
            }
        }

        function appendMessage(role, content) {
            const msg = document.createElement('div');
            msg.className = role === 'user' ? 'msg-user' : 'msg-bot';
            msg.innerText = content;
            chatContainer.appendChild(msg);

            chatContainer.scrollTo({
                top: chatContainer.scrollHeight,
                behavior: 'smooth'
            });

            if (role !== 'system') {
                chatHistory.push({ role, content });
                localStorage.setItem('vma_chat_history', JSON.stringify(chatHistory.slice(-20)));
            }
        }

        async function sendMessage() {
            const query = chatInput.value.trim();
            if (!query) return;

            appendMessage('user', query);
            chatInput.value = '';

            const typing = document.createElement('div');
            typing.className = 'msg-bot typing';
            typing.id = 'typingIndicator';
            typing.innerText = "Emma analyse votre demande...";
            chatContainer.appendChild(typing);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const response = await API.request('/ai/chat', {
                    method: 'POST',
                    body: JSON.stringify({
                        query: query,
                        history: chatHistory.slice(-10)
                    })
                });

                if (document.getElementById('typingIndicator')) document.getElementById('typingIndicator').remove();
                appendMessage('bot', response.reply);

            } catch (err) {
                if (document.getElementById('typingIndicator')) document.getElementById('typingIndicator').remove();
                appendMessage('bot', "Je synchronise mes données de sourcing. Reposons votre question dans un instant.");
            }
        }

        sendBtn.onclick = sendMessage;
        chatInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };

        window.onload = loadHistory;
    </script>
</body>
</html>
