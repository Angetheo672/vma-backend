<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VMA Emma | Assistant IA</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="app-shell" style="background: #000;">
    <header class="app-header" style="height: 60px; display: flex; align-items: center; background: #111;">
        <div style="padding: 0 15px; display: flex; align-items: center; gap: 15px;">
            <i class="fa fa-chevron-left" onclick="history.back()" style="color: var(--vma-gold);"></i>
            <div style="display: flex; align-items: center; gap: 10px;">
                <div style="width: 35px; height: 35px; background: #ff4d94; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #fff; border: 2px solid var(--vma-gold);">
                    <i class="fa fa-robot"></i>
                </div>
                <div>
                    <div style="font-size: 14px; font-weight: 700;">VMA Emma</div>
                    <div style="font-size: 10px; color: var(--vma-green);">En ligne</div>
                </div>
            </div>
        </div>
    </header>

    <main id="chatContainer" style="padding: 70px 15px 100px; display: flex; flex-direction: column; gap: 15px;">
        <div class="msg-bot">Bonjour ! Je suis Emma, votre assistante VMA. Comment puis-je vous aider aujourd'hui ?</div>
    </main>

    <div style="position: fixed; bottom: 0; width: 100%; background: #111; padding: 15px; border-top: 1px solid #222; display: flex; gap: 10px; z-index: 1000;">
        <input type="text" id="chatInput" placeholder="Posez une question..." style="flex: 1; background: #000; border: 1px solid #333; padding: 12px; border-radius: 20px; color: #fff; font-family: inherit; outline: none;">
        <button id="sendBtn" style="width: 45px; height: 45px; background: var(--vma-gold); border: none; border-radius: 50%; color: #000; font-size: 18px;">
            <i class="fa fa-paper-plane"></i>
        </button>
    </div>

    <style>
        .msg-bot, .msg-user {
            max-width: 80%; padding: 12px 16px; border-radius: 15px; font-size: 13px; line-height: 1.5;
        }
        .msg-bot { background: #1a1a1a; color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #222; }
        .msg-user { background: var(--vma-gold); color: #000; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: 500; }
    </style>

    <script src="js/api.js"></script>
    <script>
        const chatContainer = document.getElementById('chatContainer');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');

        async function sendMessage() {
            const query = chatInput.value.trim();
            if (!query) return;

            // Add user message
            const userMsg = document.createElement('div');
            userMsg.className = 'msg-user';
            userMsg.innerText = query;
            chatContainer.appendChild(userMsg);
            chatInput.value = '';
            window.scrollTo(0, document.body.scrollHeight);

            // Show typing indicator
            const typing = document.createElement('div');
            typing.className = 'msg-bot';
            typing.innerText = '...';
            chatContainer.appendChild(typing);

            try {
                const response = await API.askBuddy(query);
                typing.innerText = response.reply;
            } catch (err) {
                typing.innerText = "Désolé, j'ai rencontré un problème. Vérifiez votre connexion.";
            }
            window.scrollTo(0, document.body.scrollHeight);
        }

        sendBtn.onclick = sendMessage;
        chatInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
