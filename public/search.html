<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recherche | VMA Elite</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="app-shell">
    <header class="app-header">
        <div style="display: flex; gap: 15px; align-items: center; width: 100%;">
            <i class="fa fa-chevron-left" onclick="history.back()" style="color: var(--vma-gold); font-size: 20px;"></i>
            <div class="search-container" style="flex: 1; margin: 0;">
                <i class="fa fa-search"></i>
                <input type="text" id="searchInput" placeholder="Que recherchez-vous ?" autofocus>
            </div>
        </div>
    </header>

    <main class="scroll-container">
        <!-- SUGGESTIONS -->
        <div id="suggestions" style="margin-bottom: 30px;">
            <h4 style="font-size: 12px; color: var(--text-muted); margin-bottom: 15px;">RECHERCHES POPULAIRES</h4>
            <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                <span class="tag" onclick="searchFor('iPhone 15')">iPhone 15</span>
                <span class="tag" onclick="searchFor('Montre')">Montre Luxe</span>
                <span class="tag" onclick="searchFor('1688')">Sourcing 1688</span>
                <span class="tag" onclick="searchFor('Baskets')">Baskets</span>
            </div>
        </div>

        <!-- RESULTS -->
        <div id="searchResults" class="main-grid">
            <!-- Products injected here -->
        </div>
    </main>

    <style>
        .tag { background: #111; padding: 6px 15px; border-radius: 20px; border: 1px solid #222; font-size: 11px; color: var(--vma-gold); }
    </style>

    <script src="js/api.js"></script>
    <script>
        const input = document.getElementById('searchInput');
        input.oninput = async (e) => {
            const query = e.target.value;
            if (query.length > 2) {
                await performSearch(query);
            }
        };

        async function searchFor(val) {
            input.value = val;
            await performSearch(val);
        }

        async function performSearch(query) {
            const grid = document.getElementById('searchResults');
            const suggestions = document.getElementById('suggestions');

            try {
                // Loader visual
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 50px;">
                    <i class="fa fa-spinner fa-spin" style="color: var(--vma-gold); font-size: 30px;"></i>
                    <p style="margin-top: 15px; color: #555;">Recherche mondiale sur Alibaba, 1688, Amazon...</p>
                </div>`;

                // 1. Search Local Products
                const localProducts = await API.getProducts();
                let results = localProducts.filter(p => p.name.toLowerCase().includes(query.toLowerCase()));

                // 2. GLOBAL AGGREGATION (Alibaba, 1688, Amazon, etc.)
                const globalResults = await API.analyzeLink(query); // Utilise la nouvelle route multi-plateforme
                results = [...results, ...globalResults];

                if (results.length === 0) {
                    grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: #666; padding: 50px;">Aucun résultat trouvé pour "${query}"</p>`;
                    return;
                }

                grid.innerHTML = results.map(p => {
                    const source = p.source || 'VMA';
                    const sourceColor = source === '1688' ? '#ff6600' : (source === 'Amazon' ? '#232f3e' : 'var(--vma-gold)');

                    return `
                        <div class="modern-card" onclick="location.href='product.html?id=${p._id || 'global'}&name=${encodeURIComponent(p.name)}&price=${p.price}&img=${encodeURIComponent(p.image)}&source=${source}'">
                            <div class="card-image-wrap">
                                <img src="${(p.images && p.images[0]) || p.image || 'https://via.placeholder.com/300'}" alt="${p.name}">
                                <div class="source-tag" style="background: ${sourceColor}">${source}</div>
                            </div>
                            <div class="card-body">
                                <h3 class="product-name">${p.name}</h3>
                                <div class="price-row">
                                    <span class="current-price">${formatPrice(p.price)} F</span>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                suggestions.style.display = 'none';
            } catch (err) {
                console.error(err);
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: red; padding: 50px;">Erreur lors de la recherche mondiale.</p>`;
            }
        }

        function formatPrice(price) {
            return new Intl.NumberFormat('fr-FR').format(price);
        }
    </script>
</body>
</html>
