<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bienvenue | Vision Market Africa</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body style="background: #000; min-height: 100vh; display: flex; flex-direction: column; margin: 0; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;">
    <!-- Animated Background -->
    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at top right, #1a1a1a, #000); z-index: -1;"></div>

    <main style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center;">
        <div class="welcome-logo-wrap" style="animation: zoomIn 1s ease-out;">
            <img src="images/logo.jpeg" style="width: 120px; border-radius: 30px; box-shadow: 0 0 30px rgba(255,215,0,0.4); margin-bottom: 30px;">
        </div>

        <h1 style="font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 10px; animation: slideUp 0.8s ease-out;">VISION MARKET AFRICA</h1>
        <p style="font-size: 14px; color: var(--vma-gold); letter-spacing: 3px; font-weight: 600; margin-bottom: 20px; animation: slideUp 1s ease-out;">LE FUTUR DU COMMERCE GLOBAL</p>

        <p style="font-size: 13px; color: var(--text-muted); line-height: 1.6; max-width: 300px; animation: slideUp 1.2s ease-out;">
            Connectez-vous directement aux usines mondiales, gérez vos importations et développez votre business sans limites.
        </p>
    </main>

    <footer style="padding: 40px; animation: slideUp 1.4s ease-out;">
        <button onclick="location.href='gateway.html'" class="vma-btn-primary" style="width: 100%; padding: 18px; font-size: 16px; box-shadow: 0 10px 20px rgba(255,215,0,0.2);">
            COMMENCER <i class="fa fa-arrow-right" style="margin-left: 10px;"></i>
        </button>
        <p style="text-align: center; color: #444; font-size: 10px; margin-top: 20px;">Version 2.4.0 Elite © 2026 VMA Group</p>
    </footer>

    <style>
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</body>
</html>
