<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bienvenue | Vision Market Africa</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body style="background: #000; min-height: 100vh; display: flex; flex-direction: column; margin: 0; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;">
    <!-- Elite Loading Overlay -->
    <div id="elite-loader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease;">
        <div class="loader-circle" style="width: 60px; height: 60px; border: 3px solid #111; border-top: 3px solid var(--vma-gold); border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <img src="images/logo.jpeg" style="width: 40px; position: absolute; border-radius: 10px;">
        <p style="margin-top: 20px; color: var(--vma-gold); font-size: 10px; letter-spacing: 2px; font-weight: 700;">INITIALISATION ELITE...</p>
    </div>

    <!-- Animated Background -->
    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at top right, #1a1a1a, #000); z-index: -1;"></div>

    <main style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center;">
        <div class="welcome-logo-wrap" style="animation: zoomIn 1s ease-out;">
            <img src="images/logo.jpeg" style="width: 140px; border-radius: 35px; box-shadow: 0 15px 35px rgba(255,215,0,0.3); margin-bottom: 30px; border: 2px solid var(--vma-gold);">
        </div>

        <h1 style="font-size: 30px; font-weight: 800; color: #fff; margin-bottom: 10px; animation: slideUp 0.8s ease-out; letter-spacing: -1px;">VISION MARKET AFRICA</h1>
        <p style="font-size: 12px; color: var(--vma-gold); letter-spacing: 4px; font-weight: 700; margin-bottom: 25px; animation: slideUp 1s ease-out; text-transform: uppercase;">The Future of Global Trade</p>

        <p style="font-size: 14px; color: #888; line-height: 1.6; max-width: 310px; animation: slideUp 1.2s ease-out;">
            La première plateforme africaine connectée aux usines mondiales. Importation simplifiée, paiements locaux et logistique intelligente.
        </p>

        <div style="margin-top: 30px; display: flex; gap: 15px; animation: slideUp 1.4s ease-out;">
            <div style="text-align: center;">
                <i class="fa fa-shield-check" style="color: var(--vma-gold); font-size: 20px;"></i>
                <p style="font-size: 9px; color: #555; margin-top: 5px;">SÉCURISÉ</p>
            </div>
            <div style="text-align: center;">
                <i class="fa fa-bolt" style="color: var(--vma-gold); font-size: 20px;"></i>
                <p style="font-size: 9px; color: #555; margin-top: 5px;">RAPIDE</p>
            </div>
            <div style="text-align: center;">
                <i class="fa fa-globe" style="color: var(--vma-gold); font-size: 20px;"></i>
                <p style="font-size: 9px; color: #555; margin-top: 5px;">MONDIAL</p>
            </div>
        </div>
    </main>

    <footer style="padding: 40px; animation: slideUp 1.4s ease-out;">
        <button onclick="location.href='gateway.html'" class="vma-btn-primary" style="width: 100%; padding: 18px; font-size: 16px; box-shadow: 0 10px 20px rgba(255,215,0,0.2);">
            COMMENCER <i class="fa fa-arrow-right" style="margin-left: 10px;"></i>
        </button>
        <p style="text-align: center; color: #444; font-size: 10px; margin-top: 20px;">Version 2.4.0 Elite © 2026 VMA Group</p>
    </footer>

    <style>
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>

    <script>
        window.addEventListener('load', () => {
            const loader = document.getElementById('elite-loader');
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }, 800); // Petit délai pour laisser le temps au rendu de se stabiliser
        });
    </script>
</body>
</html>
