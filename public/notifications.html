<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notifications | VMA</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="app-shell" style="background: #000;">
    <header class="app-header">
        <div style="padding: 0 15px; display: flex; align-items: center; gap: 15px; height: 100%;">
            <i class="fa fa-chevron-left" onclick="history.back()" style="color: var(--vma-gold);"></i>
            <span class="brand-name">NOTIFICATIONS</span>
        </div>
    </header>

    <main class="scroll-container" style="padding: 80px 16px 20px;">
        <div id="notifList" style="display: flex; flex-direction: column; gap: 12px;">
            <div class="notif-item">
                <i class="fa fa-truck-fast" style="color: var(--vma-green);"></i>
                <div style="flex: 1;">
                    <div style="font-size: 13px; font-weight: 700;">Commande #A102 Expédiée</div>
                    <div style="font-size: 11px; color: var(--text-muted);">Votre colis a quitté l'entrepôt de Guangzhou.</div>
                </div>
                <div style="font-size: 10px; color: #444;">12:45</div>
            </div>
            <div class="notif-item">
                <i class="fa fa-percent" style="color: var(--vma-accent-red);"></i>
                <div style="flex: 1;">
                    <div style="font-size: 13px; font-weight: 700;">Promo Flash : -20% !</div>
                    <div style="font-size: 11px; color: var(--text-muted);">Sur toute la catégorie Électronique pendant 24h.</div>
                </div>
                <div style="font-size: 10px; color: #444;">Hier</div>
            </div>
        </div>
    </main>

    <style>
        .notif-item { background: #111; padding: 15px; border-radius: 12px; border: 1px solid #222; display: flex; align-items: center; gap: 15px; }
        .notif-item i { font-size: 18px; width: 30px; text-align: center; }
    </style>
</body>
</html>
