<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mes Commandes | VMA Elite</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="app-shell" style="background: #000;">
    <header class="app-header" style="height: 60px; display: flex; align-items: center; background: #111;">
        <div class="header-top" style="width: 100%; margin-bottom: 0;">
            <div class="logo-area">
                <a href="profile.html" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 10px;">
                    <i class="fa fa-chevron-left" style="color: var(--vma-gold);"></i>
                    <span style="font-weight: 700;">MES COMMANDES</span>
                </a>
            </div>
        </div>
    </header>

    <main class="scroll-container" style="padding: 70px 16px 20px;" id="ordersList">
        <div style="text-align: center; padding: 50px;">
            <i class="fa fa-spinner fa-spin" style="color: var(--vma-gold); font-size: 30px;"></i>
            <p style="margin-top: 10px; color: #555;">Chargement de vos commandes d'élite...</p>
        </div>
    </main>

    <style>
        .order-card-buyer { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 15px; }
        .status-chip { font-size: 9px; padding: 2px 8px; border-radius: 4px; font-weight: 800; }
        .status-chip.delivered { background: rgba(82,196,26,0.1); color: var(--vma-green); }
        .status-chip.shipping { background: rgba(24,144,255,0.1); color: var(--vma-blue); }
        .btn-order { background: var(--vma-gold); color: #000; border: none; padding: 10px 15px; border-radius: 8px; font-size: 11px; font-weight: 700; flex: 1; font-family: inherit; }
        .btn-order-alt { background: #222; color: #fff; border: 1px solid #333; padding: 10px 15px; border-radius: 8px; font-size: 11px; font-weight: 700; flex: 1; font-family: inherit; }
    </style>

    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const list = document.getElementById('ordersList');

            try {
                const orders = await API.getOrders();

                if (orders.length === 0) {
                    list.innerHTML = `<div style="text-align:center; padding-top:100px; color:#555;">Aucune commande pour le moment.</div>`;
                    return;
                }

                list.innerHTML = orders.map(order => {
                    const statusClass = order.orderStatus === 'delivered' ? 'delivered' : 'shipping';
                    const date = new Date(order.createdAt).toLocaleDateString();
                    const trk = order.trackingNumber || "VMA-TBC";

                    return `
                        <div class="order-card-buyer">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                                <span style="font-size: 11px; color: var(--text-muted);">${date}</span>
                                <span class="status-chip ${statusClass}">${order.orderStatus.toUpperCase()}</span>
                            </div>
                            <div style="margin-bottom: 15px;">
                                <span style="font-size: 10px; color: var(--vma-gold); font-weight: 700; background: #000; padding: 4px 8px; border-radius: 5px;">TRACKING: ${trk}</span>
                            </div>
                            <div style="display: flex; gap: 12px; margin-bottom: 15px;">
                                <div style="flex: 1;">
                                    <h4 style="font-size: 13px; color: #fff;">Commande #${order._id.slice(-6).toUpperCase()}</h4>
                                    <div style="font-size: 12px; font-weight: 700; color: var(--vma-gold); margin-top: 4px;">${new Intl.NumberFormat('fr-FR').format(order.totalAmount)} F</div>
                                </div>
                            </div>
                            <div style="display: flex; gap: 10px;">
                                <button class="btn-order-alt" onclick="window.Android ? Android.showToast('Facture en préparation...') : alert('Facture en préparation...')">Facture</button>
                                <button class="btn-order" onclick="location.href='tracking.html?trk=${trk}'">Suivre Colis</button>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                list.innerHTML = `<div style="text-align:center; padding-top:100px; color:red;">Erreur de chargement. Vérifiez votre connexion.</div>`;
            }
        });
    </script>
</body>
</html>
