<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculateur Logistique VMA</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="app-shell" style="background: #000;">
    <header class="app-header">
        <div class="logo-area" style="padding-left: 15px;">
            <i class="fa fa-chevron-left" onclick="history.back()" style="color: var(--vma-gold); margin-right: 15px;"></i>
            <span class="brand-name">CALCULATEUR SMART</span>
        </div>
    </header>

    <main class="scroll-container" style="padding: 80px 16px 20px;">
        <div style="background: linear-gradient(135deg, #111, #000); padding: 25px; border-radius: 20px; border: 1px solid #222; margin-bottom: 25px;">
            <h2 style="font-size: 18px; color: var(--vma-gold); margin-bottom: 15px;">Estimation Sourcing Chine</h2>

            <div class="calc-group">
                <label>Prix sur 1688 / Alibaba (CNY ¥)</label>
                <input type="number" id="priceCny" placeholder="Ex: 100" oninput="calculate()">
            </div>

            <div class="calc-group">
                <label>Poids estimé (Kg)</label>
                <input type="number" id="weight" placeholder="Ex: 0.5" oninput="calculate()">
            </div>

            <div class="calc-group">
                <label>Type de Fret</label>
                <select id="freightType" onchange="calculate()">
                    <option value="avion">Avion (7-10 jours) - 9500F/Kg</option>
                    <option value="bateau">Bateau (45 jours) - 450.000F/CBM</option>
                </select>
            </div>
        </div>

        <div id="resultCard" style="background: var(--vma-gold); color: #000; padding: 25px; border-radius: 20px; display: none; animation: slideUp 0.4s ease-out;">
            <div style="text-align: center; margin-bottom: 20px;">
                <span style="font-size: 12px; font-weight: 600; text-transform: uppercase;">Coût de revient total estimé</span>
                <div id="totalXaf" style="font-size: 32px; font-weight: 900;">0 F</div>
            </div>

            <div style="display: grid; gap: 10px; font-size: 13px;">
                <div style="display: flex; justify-content: space-between;">
                    <span>Prix Produit:</span>
                    <span id="prodXaf" style="font-weight: 700;">0 F</span>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span>Frais de Transport:</span>
                    <span id="shippingXaf" style="font-weight: 700;">0 F</span>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span>Commission VMA:</span>
                    <span id="commissionXaf" style="font-weight: 700;">0 F</span>
                </div>
            </div>

            <button class="vma-btn-primary" style="background: #000; color: #fff; width: 100%; margin-top: 20px; border: none;" onclick="location.href='contact.html?subject=Sourcing'">
                COMMANDER VIA VMA
            </button>
        </div>

        <div style="margin-top: 30px; padding: 15px; border-radius: 15px; background: rgba(255,215,0,0.05); border: 1px dashed var(--vma-gold);">
            <p style="font-size: 11px; color: var(--text-muted); line-height: 1.6;">
                <i class="fa fa-info-circle"></i> Cette estimation inclut le dédouanement et la livraison à nos entrepôts de Douala ou Yaoundé. Taux de change appliqué : 1 CNY = 95 XAF.
            </p>
        </div>
    </main>

    <style>
        .calc-group { margin-bottom: 20px; }
        .calc-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
        .calc-group input, .calc-group select {
            width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; color: #fff; font-family: inherit; font-size: 16px; outline: none;
        }
        .calc-group input:focus { border-color: var(--vma-gold); }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>

    <script>
        function calculate() {
            const priceCny = parseFloat(document.getElementById('priceCny').value) || 0;
            const weight = parseFloat(document.getElementById('weight').value) || 0;
            const type = document.getElementById('freightType').value;
            const resultCard = document.getElementById('resultCard');

            if (priceCny <= 0) {
                resultCard.style.display = 'none';
                return;
            }

            resultCard.style.display = 'block';

            const rate = 95; // 1 CNY = 95 XAF (including transfer fees)
            const shippingRate = type === 'avion' ? 9500 : 2500; // Simplified for demo
            const commissionRate = 0.05;

            const prodXaf = Math.ceil(priceCny * rate);
            const shippingXaf = Math.ceil(weight * shippingRate);
            const commissionXaf = Math.ceil(prodXaf * commissionRate);
            const total = prodXaf + shippingXaf + commissionXaf;

            document.getElementById('prodXaf').innerText = formatPrice(prodXaf) + " F";
            document.getElementById('shippingXaf').innerText = formatPrice(shippingXaf) + " F";
            document.getElementById('commissionXaf').innerText = formatPrice(commissionXaf) + " F";
            document.getElementById('totalXaf').innerText = formatPrice(total) + " F";
        }

        function formatPrice(price) {
            return new Intl.NumberFormat('fr-FR').format(price);
        }
    </script>
</body>
</html>
