<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VMA Logistics | Scanner & Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="app-shell" style="background: #000;">
    <header class="app-header" style="background: var(--vma-green);">
        <div style="padding: 0 15px; display: flex; align-items: center; gap: 15px; height: 100%;">
            <i class="fa fa-chevron-left" onclick="location.href='gateway.html'" style="color: #fff;"></i>
            <span class="brand-name" style="color: #fff;">VMA LOGISTICS HUB</span>
        </div>
    </header>

    <main class="scroll-container" style="padding: 80px 16px 20px;">
        <!-- ACTION CARDS -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px;">
            <div class="log-card" onclick="openScanner('receive')">
                <i class="fa fa-barcode"></i>
                <span>Réceptionner</span>
            </div>
            <div class="log-card" onclick="openScanner('ship')">
                <i class="fa fa-plane-departure"></i>
                <span>Expédier</span>
            </div>
            <div class="log-card" onclick="openScanner('deliver')">
                <i class="fa fa-house-chimney-check"></i>
                <span>Livrer</span>
            </div>
            <div class="log-card" onclick="location.href='logistics_inventory.html'">
                <i class="fa fa-warehouse"></i>
                <span>Inventaire Hub</span>
            </div>
        </div>

        <h3 style="font-size: 14px; margin-bottom: 15px; color: var(--text-muted);">FLUX RÉCENT</h3>
        <div id="logStream" style="display: flex; flex-direction: column; gap: 10px;">
            <!-- Real-time log items -->
            <div class="stream-item">
                <div class="dot green"></div>
                <div style="flex: 1;">
                    <div style="font-size: 12px; font-weight: 700;">VMA-8829 <span style="font-weight: 400; color: var(--text-muted);">reçu à Douala</span></div>
                    <div style="font-size: 10px; color: var(--vma-green);">Il y a 2 min</div>
                </div>
            </div>
        </div>
    </main>

    <style>
        .log-card { background: #111; padding: 25px; border-radius: 15px; border: 1px solid #222; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .log-card i { font-size: 28px; color: var(--vma-green); }
        .log-card span { font-size: 12px; font-weight: 600; }
        .stream-item { background: #111; padding: 12px; border-radius: 10px; display: flex; align-items: center; gap: 12px; border: 1px solid #222; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot.green { background: var(--vma-green); box-shadow: 0 0 5px var(--vma-green); }
    </style>

    <script src="js/api.js"></script>
    <script>
        function openScanner(action) {
            if(window.Android) {
                Android.showToast(`Ouverture du scanner pour : ${action}`);
            } else {
                alert(`Scanner simulé pour l'action : ${action}`);
            }
        }
    </script>
</body>
</html>
