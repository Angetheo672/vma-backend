<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Connexion | Vision Market Africa</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { background: #000; overflow: hidden; }
        .auth-card { animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="app-shell">
    <main class="scroll-container" style="display: flex; align-items: center; justify-content: center; height: 100vh;">
        <div class="auth-container" style="width: 100%; max-width: 400px;">
            <div class="auth-card">
                <div style="text-align: center; margin-bottom: 30px;">
                    <img src="images/logo.jpeg" style="width: 80px; border-radius: 20px; border: 2px solid var(--vma-gold); box-shadow: 0 10px 20px rgba(255,215,0,0.2);">
                    <h2 style="margin-top: 15px; font-weight: 800; letter-spacing: -1px;">BON RETOUR !</h2>
                    <p style="font-size: 13px; color: #666;">Accédez à votre espace Vision Market Africa</p>
                </div>

                <form id="loginForm">
                    <div class="input-group">
                        <i class="fa fa-envelope"></i>
                        <input type="email" id="email" placeholder="Adresse Email" required>
                    </div>

                    <div class="input-group">
                        <i class="fa fa-lock"></i>
                        <input type="password" id="password" placeholder="Mot de passe" required>
                    </div>

                    <div style="text-align: right; margin-bottom: 25px;">
                        <a href="forgot-password.html" style="font-size: 12px; color: var(--vma-gold); text-decoration: none;">Mot de passe oublié ?</a>
                    </div>

                    <button type="submit" class="vma-btn-primary" style="width: 100%;">SE CONNECTER</button>
                </form>

                <p style="text-align: center; margin-top: 30px; font-size: 13px; color: #444;">
                    Pas encore de compte ? <a href="register.html" style="color: var(--vma-gold); font-weight: 700; text-decoration: none;">Créer un compte Elite</a>
                </p>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
